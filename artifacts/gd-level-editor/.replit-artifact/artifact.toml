kind = "web"
previewPath = "/"
title = "GD Level Editor"
version = "1.0.0"
id = "artifacts/gd-level-editor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20594

[services.development]
run = "pnpm --filter @workspace/gd-level-editor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gd-level-editor", "run", "build" ]
publicDir = "artifacts/gd-level-editor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20594"
BASE_PATH = "/"
